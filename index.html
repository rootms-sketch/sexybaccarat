  } catch(err) {
    $("lerr").textContent = `⚠ ${err.message || "เกิดข้อผิดพลาด กรุณาลองใหม่"}`;
    $("lerr").style.display = "flex";
    $("lbtn").disabled = false;
    $("lbtn").textContent = "ดูสถิติของฉัน →";
  }
}

/* ── DASHBOARD ────────────────────────────────────── */
function showDash(d){
  $("login-scr").style.display="none";
  $("dash-scr").style.display="block";

  const col=rc(d.m.rl), rname=rn(d.m.rl), rnext=rn(d.m.rl+1), bg=badge(d.b.ad), mv=motive(d);
  document.documentElement.style.setProperty("--rc",col);

  $("hero-orb").style.background=`radial-gradient(circle,${col}14,transparent 65%)`;
  const av=$("av");
  av.style.background=`linear-gradient(135deg,${col},${col}aa)`;
  av.style.setProperty("--rc",col);
  av.style.boxShadow=`0 0 0 3px var(--bg),0 0 0 5px ${col}44,0 0 20px ${col}33`;
  av.textContent=d.m.dn[0].toUpperCase();

  $("hsub").textContent="ยินดีต้อนรับกลับมา"; $("hsub").style.color=col+"cc";
  $("hname").textContent=d.m.dn;
  $("rcard").style.borderColor=col+"1a";
  $("rico").textContent=d.m.rl>=15?"🌟":d.m.rl>=10?"👑":d.m.rl>=6?"💎":"⭐";
  $("rname").textContent=rname; $("rname").style.color=col;
  $("rnext").textContent=`→ ${rnext}`;
  $("rbar").style.cssText=`width:${Math.min((d.m.rl/25)*100,100)}%;background:linear-gradient(90deg,${col}77,${col});box-shadow:0 0 7px ${col}55`;
  $("pbadge").textContent=bg.l; $("pbadge").style.color=bg.c;
  $("rlvl").textContent=`Level ${d.m.rl} / 25`;

  buildHome(d,col,bg,mv);
  buildGames(d,col);
  buildTip(d,col,bg);

  document.querySelectorAll(".nb[data-t]").forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll(".nb[data-t]").forEach(b=>{
        b.classList.remove("on");
        b.style.borderColor="var(--border)";
      });
      btn.classList.add("on");
      btn.style.borderColor=col+"33";
      const t=btn.dataset.t;
      document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"));
      $("page-"+t).classList.add("on");
    };
  });

  $("out-btn").onclick=()=>{
    $("dash-scr").style.display="none";
    $("login-scr").style.display="flex";
    $("lbtn").disabled=false; $("lbtn").textContent="ดูสถิติของฉัน →";
    $("ni").value="";
    document.documentElement.style.removeProperty("--rc");
    document.querySelectorAll(".nb[data-t]").forEach((b,i)=>{
      b.classList.toggle("on",i===0);
      b.style.borderColor="var(--border)";
    });
    document.querySelectorAll(".page").forEach((p,i)=>p.classList.toggle("on",i===0));
  };
}

/* ── PAGE: HOME ───────────────────────────────────── */
function buildHome(d,col,bg,mv){
  const p=$("page-home"); p.innerHTML="";
  const wr=d.s.wr, wc=wr>=44?"#34d399":wr>=30?"#f0c060":"#aaaacc";

  p.innerHTML=`
  <div class="card fu" style="background:linear-gradient(135deg,var(--bg2),var(--bg3));border-color:${col}1e;animation-delay:0ms">
    <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${col}44,transparent)"></div>
    <div style="display:flex;gap:14px;align-items:center">
      <div class="float" style="font-size:42px;filter:drop-shadow(0 0 14px ${col}66);flex-shrink:0">${mv.e}</div>
      <div>
        <div class="shimmer-gold" style="font-size:18px;font-weight:900;margin-bottom:3px">${mv.t}</div>
        <div style="font-size:13px;color:var(--muted2);line-height:1.6;font-family:'Sarabun',sans-serif">${mv.m}</div>
      </div>
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px">
    <div class="card fu" style="text-align:center;padding:18px 10px;animation-delay:45ms">
      <div style="position:relative;width:78px;height:78px;margin:0 auto 9px">
        ${ring(wr,78,7,"#34d399")}
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
          <span style="font-size:14px;font-weight:900;color:#34d399;line-height:1">${wr}%</span>
          <span style="font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:1px">WIN</span>
        </div>
      </div>
      <div class="lbl">WIN RATE</div>
      <div style="font-size:12px;font-weight:700;color:${wc};margin-top:2px">${wr>=44?"🔥 ร้อนแรง!":wr>=30?"👍 ดีมาก":"💪 สู้ต่อ"}</div>
    </div>

    <div class="card fu" style="text-align:center;padding:18px 10px;animation-delay:75ms">
      <div class="pop" style="font-size:66px;font-weight:900;line-height:1;color:var(--pk2);filter:drop-shadow(0 0 18px var(--pk)66);animation-delay:250ms">${d.s.sk}</div>
      <div style="font-size:18px;margin-top:-4px">🔥</div>
      <div class="lbl" style="margin-top:5px">WIN STREAK<br><span style="color:var(--teal);font-size:8px">LIVE ONLY</span></div>
      <div style="font-size:12px;font-weight:700;color:var(--pk2);margin-top:2px">${skMsg(d.s.sk)}</div>
    </div>
  </div>

  <div class="card fu" style="animation-delay:100ms">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div>
        <div class="lbl" style="margin:0">Active Days (30 วัน)</div>
        <div style="font-size:21px;font-weight:900;color:${bg.c};margin-top:2px">${d.b.ad} <span style="font-size:12px;color:var(--muted);font-weight:400">/ 30 วัน</span></div>
      </div>
      <div style="background:${bg.c}18;border:1px solid ${bg.c}33;border-radius:20px;padding:5px 12px;font-size:11px;font-weight:700;color:${bg.c}">${bg.l}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(10,1fr);gap:3px">
      ${Array.from({length:30},(_,i)=>`<div style="aspect-ratio:1;border-radius:3px;background:${i<d.b.ad?bg.c:"#ffffff07"};opacity:${i<d.b.ad?Math.min(.4+(i/d.b.ad)*.6,1):1};box-shadow:${i<d.b.ad?`0 0 3px ${bg.c}44`:"none"}"></div>`).join("")}
    </div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px">
    ${[
      {i:"🎮",v:d.s.ts,       l:"Sessions"},
      {i:"🎲",v:fmt(d.s.tb),  l:"Total Bets"},
      {i:"💰",v:"฿"+fmt(d.s.ab),l:"Avg Bet"},
    ].map((s,i)=>`
    <div class="card fu" style="padding:13px 8px;text-align:center;animation-delay:${125+i*30}ms">
      <div style="font-size:20px;margin-bottom:4px">${s.i}</div>
      <div style="font-size:13px;font-weight:800;line-height:1">${s.v}</div>
      <div class="lbl" style="margin-top:5px;font-size:9px">${s.l}</div>

}

/* ── PAGE: GAMES ──────────────────────────────────── */
function buildGames(d,col){
  const p=$("page-games"); p.innerHTML="";
  const gs=d.g.filter(g=>g.n);
  const rm=[{l:"#1",bg:col,tc:"#05050f"},{l:"#2",bg:"#ffffff18",tc:"var(--muted2)"},{l:"#3",bg:"#ffffff0c",tc:"var(--muted)"}];

  p.innerHTML=`
  <div class="card fu" style="border-color:${col}1e;animation-delay:0ms">
    <div style="position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,${col}44,transparent)"></div>
    <div class="lbl" style="margin-bottom:12px">เกมที่เล่นบ่อยที่สุด 🎮</div>
    ${gs.length===0?`<div style="color:var(--muted);font-size:13px">ยังไม่มีข้อมูล</div>`:
    gs.map((g,i)=>`
    <div style="display:flex;align-items:center;gap:11px;padding:11px 0;${i<gs.length-1?"border-bottom:1px solid var(--border)":""}">
      <div style="width:26px;height:26px;border-radius:8px;background:${rm[i].bg};color:${rm[i].tc};font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0">${rm[i].l}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${g.n}</div>
        <div style="font-size:11px;color:var(--muted2);margin-top:1px;font-family:'Sarabun',sans-serif">${g.p}</div>
      </div>
      <span class="type-pill" style="background:${tcol(g.t)}18;color:${tcol(g.t)};border:1px solid ${tcol(g.t)}33">${g.t}</span>
    </div>`).join("")}
  </div>

  <div class="card fu" style="animation-delay:55ms;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center">
    <div style="position:relative;width:78px;height:78px;flex-shrink:0">
      ${ring(d.s.wr,78,7,"#34d399")}
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <span style="font-size:14px;font-weight:900;color:#34d399;line-height:1">${d.s.wr}%</span>
        <span style="font-size:8px;color:var(--muted);letter-spacing:1px;margin-top:1px">WIN</span>
      </div>
    </div>
    <div>
      ${[
        {l:"Win Streak (LIVE)",v:`${d.s.sk} 🔥`,c:"var(--pk2)"},
        {l:"Sessions",         v:d.s.ts},
        {l:"Avg Session",      v:`${d.s.sm} นาที`},
        {l:"Avg Bet",          v:`฿${fmt(d.s.ab)}`},
      ].map(r=>`
      <div class="srow">
        <span style="font-size:12px;color:var(--muted2);font-family:'Sarabun',sans-serif">${r.l}</span>
        <span style="font-size:13px;font-weight:700;color:${r.c||"var(--text)"};">${r.v}</span>
      </div>`).join("")}
    </div>
  </div>

  <div class="card fu" style="animation-delay:95ms">
    <div class="lbl" style="margin-bottom:10px">ความถี่ตามช่วงเวลา (Golden Hour) ⏰</div>
    <div style="display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-bottom:8px">
      ${Array.from({length:24},(_,i)=>{
        const isG=i===d.b.gh, near=Math.abs(i-d.b.gh)<=2;
        const h=isG?1:near?.55:.1+Math.random()*.3;
        return `<div title="${String(i).padStart(2,"0")}:00" style="aspect-ratio:1;border-radius:4px;cursor:default;background:${isG?col:`rgba(100,120,220,${.06+h*.5})`};box-shadow:${isG?`0 0 8px ${col}66`:"none"};border:${isG?`1px solid ${col}55`:"1px solid transparent"};transition:transform .15s" onmouseover="this.style.transform='scale(1.5)'" onmouseout="this.style.transform='scale(1)'"></div>`;
      }).join("")}
    </div>
    <div style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;font-family:'Sarabun',sans-serif">
      <span style="width:10px;height:10px;border-radius:2px;background:${col};display:inline-block"></span>
      Golden Hour: <strong style="color:${col}">${String(d.b.gh).padStart(2,"0")}:00 น.</strong>
    </div>
  </div>`;
}

/* ── PAGE: TIP ────────────────────────────────────── */

  p.innerHTML=`
  <div class="card fu" style="background:linear-gradient(135deg,#1a0022,#220030);border-color:var(--pk)30;animation-delay:0ms">
    <div style="display:flex;gap:14px;align-items:center">
      <div class="float" style="font-size:46px;filter:drop-shadow(0 0 14px var(--pk)77);flex-shrink:0">⭐</div>
      <div>
        <div class="lbl" style="color:var(--pk2)aa">Golden Hour ของคุณ</div>
        <div style="font-size:36px;font-weight:900;color:var(--pk2);line-height:1">${d.b.gh}:00 <span style="font-size:15px;color:var(--muted2);font-weight:400">น.</span></div>
        <div style="font-size:13px;color:var(--muted2);margin-top:5px;line-height:1.6;font-family:'Sarabun',sans-serif">ช่วงเวลาที่คุณเล่นได้ดีที่สุด เล่นตอนนี้เลย!</div>
      </div>
    </div>
  </div>

  <div class="card fu" style="background:linear-gradient(135deg,#0e1a1a,#0f2020);border-color:#2dd4bf28;animation-delay:50ms">
    <div style="display:flex;gap:14px;align-items:center">
      <div class="float" style="font-size:40px;animation-duration:3.8s;flex-shrink:0">⏱️</div>
      <div>
        <div class="lbl" style="color:#2dd4bfaa">Session ที่แนะนำ</div>
        <div style="font-size:28px;font-weight:900;color:#2dd4bf;line-height:1">${d.b.rs}</div>
        <div style="font-size:13px;color:#557788;margin-top:5px;line-height:1.6;font-family:'Sarabun',sans-serif">เล่นในระยะที่เหมาะสมช่วยรักษา win rate ได้ดี</div>
      </div>
    </div>
  </div>

  ${tg?`
  <div class="card fu" style="animation-delay:95ms">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:13px">
      <div style="font-size:30px">${tg.t==="SLOT"?"🎰":"🃏"}</div>
      <div>
        <div class="lbl">เกมที่คุณถนัดที่สุด</div>
        <div style="font-size:16px;font-weight:800;color:${col}">${tg.n}</div>
        <div style="font-size:11px;color:var(--muted2);margin-top:1px;font-family:'Sarabun',sans-serif">${tg.p} · <span style="color:${tcol(tg.t)}">${tg.t}</span></div>
      </div>
    </div>
    <div style="background:#ffffff05;border-radius:12px;padding:11px 13px;border:1px solid var(--border);font-size:13px;color:var(--muted2);line-height:1.7;font-family:'Sarabun',sans-serif">
      เล่น <span style="color:${col};font-weight:700">${tg.n}</span> ช่วง <span style="color:var(--pk2);font-weight:700">${d.b.gh}:00 น.</span> เพื่อผลลัพธ์ที่ดีที่สุด!
    </div>
  </div>`:""}

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    ${[
      {i:"🔥",l:"Win Streak (LIVE)",v:`${d.s.sk} ครั้ง`,c:"var(--pk2)"},
      {i:"⚡",l:"Win Rate",         v:`${d.s.wr}%`,      c:d.s.wr>=44?"#34d399":"var(--pu2)"},
      {i:"📅",l:"Active Days",      v:`${d.b.ad}/30`,    c:bg.c},
      {i:"🎮",l:"Sessions",         v:`${d.s.ts} รอบ`,   c:"#7ec8e3"},
    ].map((s,i)=>`
    <div class="card fu" style="padding:13px;animation-delay:${120+i*30}ms">
      <div style="font-size:20px;margin-bottom:5px">${s.i}</div>
      <div class="lbl" style="margin:0 0 3px">${s.l}</div>
      <div style="font-size:19px;font-weight:900;color:${s.c}">${s.v}</div>

}
</script>
